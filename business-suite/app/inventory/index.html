<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory | KoboDocs Business Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
  .inv-wrap{ max-width:1000px; margin:0 auto; padding:36px 20px 100px; }
  .inv-top{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; margin-bottom:24px; }
  .bs-panel{ background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:22px 20px; margin-bottom:20px; }
  .field-row-3{ display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:12px; }
  @media (max-width:640px){ .field-row-3{ grid-template-columns:1fr; } }
  table.inv-table{ width:100%; border-collapse:collapse; font-size:0.88rem; }
  table.inv-table th{ text-align:left; opacity:0.55; font-weight:500; font-size:0.76rem; text-transform:uppercase; padding:6px 8px; border-bottom:1px solid var(--line); }
  table.inv-table td{ padding:10px 8px; border-bottom:1px dashed var(--line); vertical-align:middle; }
  table.inv-table tr:last-child td{ border-bottom:none; }
  .low-stock-tag{
    font-family:'Space Mono', monospace; font-size:0.68rem; text-transform:uppercase;
    background:rgba(168,52,42,0.1); color:var(--stamp-red); padding:2px 10px; border-radius:20px; margin-left:8px;
  }
  .row-actions{ display:flex; gap:6px; flex-wrap:wrap; }
  .row-actions button{ font-size:0.78rem; border:1px solid var(--line); background:none; border-radius:20px; padding:4px 12px; cursor:pointer; }
  .empty-note{ font-size:0.88rem; opacity:0.6; padding:20px 0; text-align:center; }
  #formMsg{ font-size:0.85rem; margin-top:12px; padding:10px 12px; border-radius:4px; display:none; }
  #formMsg.error{ display:block; background:rgba(168,52,42,0.08); color:var(--stamp-red); }
  #formMsg.success{ display:block; background:rgba(199,154,60,0.12); color:var(--ink-green-deep); }
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100;
    align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--paper); border-radius:10px; padding:24px 22px; max-width:360px; width:100%; }
  .modal-box h3{ font-size:1rem; margin-bottom:14px; }
</style>
</head>
<body>

<header>
  <nav class="nav">
    <a href="/" class="logo">
      <svg class="mark" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#C79A3C" stroke-width="2.5"/>
        <circle cx="16" cy="16" r="8" stroke="#C79A3C" stroke-width="1.5"/>
      </svg>
      KoboDocs
    </a>
    <button class="menu-btn" aria-label="Toggle menu" id="menuBtn"><span></span><span></span><span></span></button>
    <div class="nav-links" id="navLinks">
      <a href="/business-suite/app/">Dashboard</a>
      <a href="/business-suite/app/debt/">Who owes you</a>
      <a href="/business-suite/app/quotes/">Quotes</a>
      <a href="/business-suite/app/expenses/">Expenses</a>
      <a href="/business-suite/app/inventory/">Inventory</a>
      <a href="/business-suite/app/clients/">Clients</a>
      <a href="/account/" id="navAccountLink">Sign in</a>
    </div>
  </nav>
</header>

<div class="inv-wrap">
  <div class="inv-top">
    <div>
      <a href="/business-suite/app/">&larr; Dashboard</a>
      <h1 style="font-size:1.4rem; margin-top:6px;">Inventory</h1>
    </div>
  </div>

  <div class="bs-panel">
    <h2 style="font-size:1rem; margin-bottom:14px;" id="formHeading">Add an item</h2>
    <input type="hidden" id="editingId">
    <div class="field-row-3">
      <div class="field-group"><label for="itName">Item name</label><input type="text" id="itName" placeholder="Ankara fabric, 6 yards"></div>
      <div class="field-group"><label for="itSku">SKU (optional)</label><input type="text" id="itSku" placeholder="ANK-006"></div>
      <div class="field-group"><label for="itUnit">Unit</label><input type="text" id="itUnit" value="unit" placeholder="unit, yard, bag"></div>
    </div>
    <div class="field-row-3">
      <div class="field-group"><label for="itCost">Cost price (₦)</label><input type="number" id="itCost" min="0"></div>
      <div class="field-group"><label for="itSell">Sell price (₦)</label><input type="number" id="itSell" min="0"></div>
      <div class="field-group"><label for="itReorder">Reorder level</label><input type="number" id="itReorder" min="0" value="5"></div>
    </div>
    <div class="field-row-3">
      <div class="field-group"><label for="itQty">Opening quantity</label><input type="number" id="itQty" min="0" value="0"></div>
      <div class="field-group"><label for="itCategory">Category (optional)</label><input type="text" id="itCategory" placeholder="Fabric, hardware..."></div>
      <div></div>
    </div>
    <div class="action-row">
      <button type="button" class="btn btn-primary" id="saveItemBtn">Save item</button>
      <button type="button" class="btn btn-ghost" id="cancelEditBtn" style="display:none;">Cancel edit</button>
    </div>
    <div id="formMsg"></div>
  </div>

  <div class="bs-panel">
    <h2 style="font-size:1rem; margin-bottom:14px;">Your items</h2>
    <div id="itemListWrap"><div class="empty-note">Loading…</div></div>
  </div>
</div>

<div class="modal-overlay" id="stockModal">
  <div class="modal-box">
    <h3 id="stockModalTitle">Adjust stock</h3>
    <div class="field-group">
      <label for="stockQty">Quantity</label>
      <input type="number" id="stockQty" min="0">
    </div>
    <div class="field-group">
      <label for="stockReason">Reason (optional)</label>
      <input type="text" id="stockReason" placeholder="e.g. New delivery from supplier">
    </div>
    <div class="action-row">
      <button type="button" class="btn btn-primary" id="confirmStockBtn">Confirm</button>
      <button type="button" class="btn btn-ghost" id="cancelStockBtn">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="/assets/auth.js"></script>
<script src="/assets/nav-auth.js" defer></script>
<script src="/business-suite/app/guard.js"></script>
<script src="/business-suite/app/inventory/inventory.js" defer></script>
</body>
</html>
