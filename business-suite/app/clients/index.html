<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clients | KoboDocs Business Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
  .cl-wrap{ max-width:900px; margin:0 auto; padding:36px 20px 100px; }
  .cl-top{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; margin-bottom:24px; }
  .cl-panel{ background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:22px 20px; margin-bottom:20px; }
  .field-row-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:600px){ .field-row-2{ grid-template-columns:1fr; } }
  .cl-row{ display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 0; border-bottom:1px dashed var(--line); flex-wrap:wrap; }
  .cl-row:last-child{ border-bottom:none; }
  .cl-row .name{ font-weight:600; }
  .cl-row .sub{ font-size:0.82rem; opacity:0.6; }
  .cl-row .edit-btn{ font-size:0.82rem; background:none; border:1px solid var(--line); border-radius:20px; padding:5px 14px; cursor:pointer; }
  .empty-note{ font-size:0.88rem; opacity:0.6; padding:20px 0; text-align:center; }
  #formMsg{ font-size:0.85rem; margin-top:12px; padding:10px 12px; border-radius:4px; display:none; }
  #formMsg.error{ display:block; background:rgba(168,52,42,0.08); color:var(--stamp-red); }
  #formMsg.success{ display:block; background:rgba(199,154,60,0.12); color:var(--ink-green-deep); }
</style>
</head>
<body>

<header>
  <nav class="nav">
    <a href="/" class="logo">
      <svg class="mark" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#C79A3C" stroke-width="2.5"/>
        <circle cx="16" cy="16" r="8" stroke="#C79A3C" stroke-width="1.5"/>
      </svg>
      KoboDocs
    </a>
    <button class="menu-btn" aria-label="Toggle menu" id="menuBtn"><span></span><span></span><span></span></button>
    <div class="nav-links" id="navLinks">
      <a href="/business-suite/app/">Dashboard</a>
      <a href="/business-suite/app/debt/">Who owes you</a>
      <a href="/business-suite/app/quotes/">Quotes</a>
      <a href="/business-suite/app/expenses/">Expenses</a>
      <a href="/business-suite/app/inventory/">Inventory</a>
      <a href="/business-suite/app/clients/">Clients</a>
      <a href="/account/" id="navAccountLink">Sign in</a>
    </div>
  </nav>
</header>

<div class="cl-wrap">
  <div class="cl-top">
    <div>
      <a href="/business-suite/app/">&larr; Dashboard</a>
      <h1 style="font-size:1.4rem; margin-top:6px;">Clients</h1>
    </div>
  </div>

  <div class="cl-panel">
    <h2 style="font-size:1rem; margin-bottom:14px;" id="formHeading">Add a client</h2>
    <input type="hidden" id="editingId">
    <div class="field-group">
      <label for="clName">Client name</label>
      <input type="text" id="clName" placeholder="Chinedu Okafor / Adaeze Fabrics Ltd">
    </div>
    <div class="field-row-2">
      <div class="field-group">
        <label for="clEmail">Email</label>
        <input type="email" id="clEmail" placeholder="client@email.com">
      </div>
      <div class="field-group">
        <label for="clPhone">Phone</label>
        <input type="text" id="clPhone" placeholder="0803 000 0000">
      </div>
    </div>
    <div class="field-row-2">
      <div class="field-group">
        <label for="clTin">TIN (for B2B invoices)</label>
        <input type="text" id="clTin" placeholder="Optional">
      </div>
      <div class="field-group">
        <label for="clCreditLimit">Credit limit (₦)</label>
        <input type="number" id="clCreditLimit" placeholder="Optional — flags when crossed">
      </div>
    </div>
    <div class="field-group">
      <label for="clAddress">Address</label>
      <input type="text" id="clAddress" placeholder="Optional">
    </div>
    <div class="field-group">
      <label for="clNotes">Notes</label>
      <textarea id="clNotes" rows="2" placeholder="e.g. always pays late, prefers bank transfer"></textarea>
    </div>
    <div class="action-row">
      <button type="button" class="btn btn-primary" id="saveClientBtn">Save client</button>
      <button type="button" class="btn btn-ghost" id="cancelEditBtn" style="display:none;">Cancel edit</button>
    </div>
    <div id="formMsg"></div>
  </div>

  <div class="cl-panel">
    <h2 style="font-size:1rem; margin-bottom:14px;">Your clients</h2>
    <div id="clientListWrap"><div class="empty-note">Loading…</div></div>
  </div>
</div>

<script type="module" src="/assets/auth.js"></script>
<script src="/assets/nav-auth.js" defer></script>
<script src="/business-suite/app/guard.js"></script>
<script>
(async function () {
  const ctx = await window.BizSuiteGuard.requireAccess();
  if (!ctx) return;
  const { business, supabase, session } = ctx;

  const listWrap = document.getElementById('clientListWrap');
  const msgEl = document.getElementById('formMsg');
  const editingIdEl = document.getElementById('editingId');
  const formHeading = document.getElementById('formHeading');
  const cancelBtn = document.getElementById('cancelEditBtn');

  function showMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className = type;
  }

  function clearForm() {
    editingIdEl.value = '';
    ['clName','clEmail','clPhone','clTin','clCreditLimit','clAddress'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('clNotes').value = '';
    formHeading.textContent = 'Add a client';
    cancelBtn.style.display = 'none';
  }

  async function loadClients() {
    const { data: clients } = await supabase
      .from('clients')
      .select('*')
      .eq('business_id', business.id)
      .order('name');

    if (!clients || !clients.length) {
      listWrap.innerHTML = '<div class="empty-note">No clients yet — add your first one above.</div>';
      return;
    }

    listWrap.innerHTML = clients.map(c => `
      <div class="cl-row" data-id="${c.id}">
        <div>
          <div class="name">${c.name}</div>
          <div class="sub">${[c.phone, c.email].filter(Boolean).join(' · ') || 'No contact info'}${c.notes ? ' — ' + c.notes : ''}</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button type="button" class="edit-btn" data-edit="${c.id}">Edit</button>
          <button type="button" class="edit-btn" data-portal="${c.id}">Copy portal link</button>
        </div>
      </div>
    `).join('');

    listWrap.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const client = clients.find(c => c.id === btn.dataset.edit);
        editingIdEl.value = client.id;
        document.getElementById('clName').value = client.name || '';
        document.getElementById('clEmail').value = client.email || '';
        document.getElementById('clPhone').value = client.phone || '';
        document.getElementById('clTin').value = client.tin || '';
        document.getElementById('clCreditLimit').value = client.credit_limit || '';
        document.getElementById('clAddress').value = client.address || '';
        document.getElementById('clNotes').value = client.notes || '';
        formHeading.textContent = 'Edit client';
        cancelBtn.style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    listWrap.querySelectorAll('[data-portal]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const clientId = btn.dataset.portal;
        const originalText = btn.textContent;
        btn.textContent = 'Preparing…';
        btn.disabled = true;

        let { data: link } = await supabase
          .from('client_portal_links')
          .select('token')
          .eq('client_id', clientId)
          .maybeSingle();

        if (!link) {
          const { data: created, error } = await supabase
            .from('client_portal_links')
            .insert({ client_id: clientId })
            .select('token')
            .single();
          if (error) {
            showMsg('Could not create portal link: ' + error.message, 'error');
            btn.textContent = originalText;
            btn.disabled = false;
            return;
          }
          link = created;
        }

        const url = `${window.location.origin}/portal/?t=${link.token}`;
        try {
          await navigator.clipboard.writeText(url);
          showMsg('Portal link copied to clipboard.', 'success');
        } catch {
          showMsg('Portal link: ' + url, 'success');
        }
        btn.textContent = originalText;
        btn.disabled = false;
      });
    });
  }

  cancelBtn.addEventListener('click', clearForm);

  document.getElementById('saveClientBtn').addEventListener('click', async () => {
    const name = document.getElementById('clName').value.trim();
    if (!name) { showMsg('Client name is required.', 'error'); return; }

    const payload = {
      business_id: business.id,
      user_id: session.user.id,
      name,
      email: document.getElementById('clEmail').value.trim() || null,
      phone: document.getElementById('clPhone').value.trim() || null,
      tin: document.getElementById('clTin').value.trim() || null,
      credit_limit: document.getElementById('clCreditLimit').value ? Number(document.getElementById('clCreditLimit').value) : null,
      address: document.getElementById('clAddress').value.trim() || null,
      notes: document.getElementById('clNotes').value.trim() || null
    };

    const editingId = editingIdEl.value;
    const { error } = editingId
      ? await supabase.from('clients').update(payload).eq('id', editingId)
      : await supabase.from('clients').insert(payload);

    if (error) {
      showMsg('Could not save client: ' + error.message, 'error');
      return;
    }

    showMsg(editingId ? 'Client updated.' : 'Client added.', 'success');
    clearForm();
    loadClients();
  });

  loadClients();
})();
</script>
</body>
</html>
