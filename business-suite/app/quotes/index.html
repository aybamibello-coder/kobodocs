<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotes | KoboDocs Business Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
  .q-wrap{ max-width:980px; margin:0 auto; padding:36px 20px 100px; }
  .q-top{ display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:14px; margin-bottom:24px; }
  .bs-panel{ background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:22px 20px; }
  .q-row{
    display:flex; justify-content:space-between; align-items:center; gap:14px;
    padding:14px 0; border-bottom:1px dashed var(--line); flex-wrap:wrap;
  }
  .q-row:last-child{ border-bottom:none; }
  .q-client{ font-weight:600; }
  .q-meta{ font-size:0.82rem; opacity:0.65; }
  .q-amount{ font-family:'Fraunces', serif; font-size:1.1rem; }
  .status-select{ font-family:'Space Mono', monospace; font-size:0.72rem; text-transform:uppercase; border-radius:20px; padding:4px 10px; border:1px solid var(--line); background:var(--paper); }
  .status-select.sent{ color:#8a6a1f; border-color:#c79a3c66; }
  .status-select.viewed{ color:#3a6ea5; border-color:#3a6ea566; }
  .status-select.accepted{ color:var(--ink-green-deep); border-color:var(--ink-green-deep); }
  .status-select.expired{ color:var(--stamp-red); border-color:var(--stamp-red); }
  .q-actions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .convert-btn{ font-size:0.8rem; border:1px solid var(--ink-green-deep); color:var(--ink-green-deep); background:none; border-radius:20px; padding:6px 14px; cursor:pointer; }
  .convert-btn:disabled{ opacity:0.4; cursor:default; }
  .empty-note{ font-size:0.88rem; opacity:0.6; padding:20px 0; text-align:center; }
  #toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--ink-green-deep); color:var(--paper); padding:10px 20px; border-radius:6px;
    font-size:0.85rem; display:none; z-index:50;
  }
</style>
</head>
<body>

<header>
  <nav class="nav">
    <a href="/" class="logo">
      <svg class="mark" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#C79A3C" stroke-width="2.5"/>
        <circle cx="16" cy="16" r="8" stroke="#C79A3C" stroke-width="1.5"/>
      </svg>
      KoboDocs
    </a>
    <button class="menu-btn" aria-label="Toggle menu" id="menuBtn"><span></span><span></span><span></span></button>
    <div class="nav-links" id="navLinks">
      <a href="/business-suite/app/">Dashboard</a>
      <a href="/business-suite/app/clients/">Clients</a>
      <a href="/account/" id="navAccountLink">Sign in</a>
    </div>
  </nav>
</header>

<div class="q-wrap">
  <div class="q-top">
    <div>
      <a href="/business-suite/app/">&larr; Dashboard</a>
      <h1 style="font-size:1.4rem; margin-top:6px;">Quotes</h1>
    </div>
    <a href="/business-suite/app/quotes/new/" class="btn btn-primary">+ New quote</a>
  </div>

  <div class="bs-panel">
    <div id="quoteListWrap"><div class="empty-note">Loading…</div></div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="/assets/auth.js"></script>
<script src="/assets/nav-auth.js" defer></script>
<script src="/business-suite/app/guard.js"></script>
<script src="/business-suite/app/quotes/quotes.js" defer></script>
</body>
</html>
