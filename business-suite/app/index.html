<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Suite | KoboDocs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
  .bs-app-wrap{ max-width:560px; margin:0 auto; padding:80px 20px; text-align:center; }
  .bs-app-wrap h1{ font-size:1.6rem; margin-bottom:14px; }
  .bs-app-wrap p{ opacity:0.72; line-height:1.55; margin-bottom:22px; }
  .trial-badge{
    display:inline-block; font-family:'Space Mono', monospace; font-size:0.78rem;
    background:var(--bone); border:1px solid var(--line); border-radius:20px;
    padding:8px 18px; margin-bottom:24px;
  }
</style>
</head>
<body>
<header>
  <nav class="nav">
    <a href="/" class="logo">
      <svg class="mark" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#C79A3C" stroke-width="2.5"/>
        <circle cx="16" cy="16" r="8" stroke="#C79A3C" stroke-width="1.5"/>
      </svg>
      KoboDocs
    </a>
    <button class="menu-btn" aria-label="Toggle menu" id="menuBtn"><span></span><span></span><span></span></button>
    <div class="nav-links" id="navLinks">
      <a href="/#tools">Tools</a>
      <a href="/pricing/">Pricing</a>
      <a href="/account/" id="navAccountLink">Sign in</a>
    </div>
  </nav>
</header>

<div class="bs-app-wrap">
  <div class="trial-badge" id="trialBadge">Checking your access…</div>
  <h1 id="appHeading">Welcome to Business Suite</h1>
  <p id="appBody">The invoicing, recurring billing, debt tracking, and bookkeeping workspace is being built out next — this page confirms your trial/subscription is active and wired to your account.</p>
  <a href="/business-suite/" class="btn btn-ghost">Back to Business Suite plan</a>
</div>

<script type="module" src="/assets/auth.js"></script>
<script src="/assets/nav-auth.js" defer></script>
<script>
(async function () {
  await new Promise(r => {
    if (window.KoboAuth) return r();
    window.addEventListener('kobo-auth-ready', r, { once: true });
  });

  const badge = document.getElementById('trialBadge');
  const heading = document.getElementById('appHeading');
  const body = document.getElementById('appBody');

  const session = await window.KoboAuth.getSession();
  if (!session) {
    window.location.href = '/business-suite/';
    return;
  }

  const supabase = window.KoboAuth.supabase;
  const { data: business } = await supabase
    .from('businesses')
    .select('suite_status, suite_trial_ends_at, suite_expires_at')
    .eq('owner_user_id', session.user.id)
    .maybeSingle();

  const now = new Date();
  const trialActive = business && business.suite_status === 'trial' && new Date(business.suite_trial_ends_at) > now;
  const subActive = business && business.suite_status === 'active' && new Date(business.suite_expires_at) > now;

  if (!business || (!trialActive && !subActive)) {
    heading.textContent = 'Your access has ended';
    body.textContent = 'Your Business Suite trial or subscription is not active. Head back to the plan page to subscribe.';
    badge.textContent = 'No active access';
    return;
  }

  if (trialActive) {
    const daysLeft = Math.max(0, Math.ceil((new Date(business.suite_trial_ends_at) - now) / (1000 * 60 * 60 * 24)));
    badge.textContent = `Free trial — ${daysLeft} day(s) left`;
  } else {
    badge.textContent = 'Subscription active';
  }
})();
</script>
</body>
</html>
