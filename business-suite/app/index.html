<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | KoboDocs Business Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
  .bs-dash-wrap{ max-width:1000px; margin:0 auto; padding:36px 20px 100px; }
  .bs-dash-top{ display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; margin-bottom:26px; }
  .trial-badge{
    font-family:'Space Mono', monospace; font-size:0.72rem; background:var(--bone);
    border:1px solid var(--line); border-radius:20px; padding:6px 14px;
  }
  .bs-actions{ display:flex; gap:10px; flex-wrap:wrap; }
  .stat-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; margin-bottom:32px; }
  @media (max-width:700px){ .stat-grid{ grid-template-columns:1fr; } }
  .stat-card{ background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:20px 18px; }
  .stat-card .label{ font-size:0.78rem; opacity:0.6; margin-bottom:8px; }
  .stat-card .value{ font-family:'Fraunces', serif; font-size:1.6rem; }
  .stat-card.warn .value{ color:var(--stamp-red); }

  .bs-panel{ background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:22px 20px; }
  .bs-panel h2{ font-size:1.05rem; margin-bottom:16px; }
  table.doc-table{ width:100%; border-collapse:collapse; font-size:0.88rem; }
  table.doc-table th{ text-align:left; opacity:0.55; font-weight:500; font-size:0.76rem; text-transform:uppercase; letter-spacing:0.03em; padding:6px 8px; border-bottom:1px solid var(--line); }
  table.doc-table td{ padding:10px 8px; border-bottom:1px dashed var(--line); }
  table.doc-table tr:last-child td{ border-bottom:none; }
  .status-pill{ font-family:'Space Mono', monospace; font-size:0.7rem; text-transform:uppercase; padding:3px 10px; border-radius:20px; }
  .status-pill.unpaid{ background:rgba(168,52,42,0.1); color:var(--stamp-red); }
  .status-pill.partial{ background:rgba(199,154,60,0.15); color:#8a6a1f; }
  .status-pill.paid{ background:rgba(20,52,43,0.1); color:var(--ink-green-deep); }
  .empty-note{ font-size:0.88rem; opacity:0.6; padding:20px 0; text-align:center; }
</style>
</head>
<body>

<header>
  <nav class="nav">
    <a href="/" class="logo">
      <svg class="mark" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#C79A3C" stroke-width="2.5"/>
        <circle cx="16" cy="16" r="8" stroke="#C79A3C" stroke-width="1.5"/>
      </svg>
      KoboDocs
    </a>
    <button class="menu-btn" aria-label="Toggle menu" id="menuBtn"><span></span><span></span><span></span></button>
    <div class="nav-links" id="navLinks">
      <a href="/business-suite/app/debt/">Who owes you</a>
      <a href="/business-suite/app/quotes/">Quotes</a>
      <a href="/business-suite/app/expenses/">Expenses</a>
      <a href="/business-suite/app/clients/">Clients</a>
      <a href="/account/" id="navAccountLink">Sign in</a>
    </div>
  </nav>
</header>

<div class="bs-dash-wrap">
  <div class="bs-dash-top">
    <div>
      <h1 style="font-size:1.5rem; margin-bottom:6px;" id="bizNameHeading">Business Suite</h1>
      <span class="trial-badge" id="trialBadge">Checking access…</span>
    </div>
    <div class="bs-actions">
      <a href="/business-suite/app/clients/" class="btn btn-ghost">Manage clients</a>
      <a href="/business-suite/app/invoice/" class="btn btn-primary">+ New invoice</a>
    </div>
  </div>

  <div class="stat-grid">
    <a href="/business-suite/app/debt/" class="stat-card warn" style="display:block; text-decoration:none; color:inherit;">
      <div class="label">Outstanding (who owes you)</div>
      <div class="value" id="statOutstanding">—</div>
    </a>
    <div class="stat-card">
      <div class="label">Collected this month</div>
      <div class="value" id="statMonthIncome">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Invoices this month</div>
      <div class="value" id="statInvoiceCount">—</div>
    </div>
  </div>

  <div class="bs-panel">
    <h2>Recent invoices</h2>
    <div id="invoiceTableWrap">
      <div class="empty-note">Loading…</div>
    </div>
  </div>
</div>

<script type="module" src="/assets/auth.js"></script>
<script src="/assets/nav-auth.js" defer></script>
<script src="/business-suite/app/guard.js"></script>
<script>
(async function () {
  const naira = (n) => '₦' + (Number(n) || 0).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const ctx = await window.BizSuiteGuard.requireAccess();
  if (!ctx) return;
  const { business, supabase, trialActive, daysLeft } = ctx;

  document.getElementById('bizNameHeading').textContent = business.name || 'Business Suite';
  document.getElementById('trialBadge').textContent = trialActive
    ? `Free trial — ${daysLeft} day(s) left`
    : 'Subscription active';

  const { data: documents } = await supabase
    .from('documents')
    .select('id, doc_type, amount, amount_paid, payment_status, due_date, created_at, data, client_id, clients(name)')
    .eq('business_id', business.id)
    .eq('doc_type', 'invoice')
    .order('created_at', { ascending: false })
    .limit(25);

  const docs = documents || [];

  const outstanding = docs
    .filter(d => d.payment_status !== 'paid')
    .reduce((s, d) => s + (Number(d.amount) - Number(d.amount_paid || 0)), 0);

  const startOfMonth = new Date();
  startOfMonth.setDate(1);
  startOfMonth.setHours(0, 0, 0, 0);

  const thisMonthDocs = docs.filter(d => new Date(d.created_at) >= startOfMonth);
  const monthIncome = thisMonthDocs
    .filter(d => d.payment_status === 'paid')
    .reduce((s, d) => s + Number(d.amount || 0), 0);

  document.getElementById('statOutstanding').textContent = naira(outstanding);
  document.getElementById('statMonthIncome').textContent = naira(monthIncome);
  document.getElementById('statInvoiceCount').textContent = thisMonthDocs.length;

  const wrap = document.getElementById('invoiceTableWrap');
  if (!docs.length) {
    wrap.innerHTML = '<div class="empty-note">No invoices yet — create your first one to see it here.</div>';
    return;
  }

  wrap.innerHTML = `
    <table class="doc-table">
      <thead><tr><th>Invoice</th><th>Client</th><th>Due</th><th>Amount</th><th>Status</th></tr></thead>
      <tbody>
        ${docs.map(d => `
          <tr>
            <td>${(d.data && d.data.invNumber) || '—'}</td>
            <td>${(d.clients && d.clients.name) || '—'}</td>
            <td>${d.due_date ? new Date(d.due_date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '—'}</td>
            <td>${naira(d.amount)}</td>
            <td><span class="status-pill ${d.payment_status}">${d.payment_status}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
})();
</script>
</body>
</html>
